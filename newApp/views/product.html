<section class="container py-5" ng-if="product">
    <div class="row g-5 align-items-start">

        <div class="col-md-6">
            <div class="bg-white border rounded-4 p-4 text-center shadow-sm">
                <img ng-src="{{product.img}}" class="img-fluid rounded-4" alt="{{product.name}}">
            </div>
        </div>

        <div class="col-md-6">
            <p class="text-success fw-semibold mb-2">{{product.category}}</p>

            <h2 class="fw-bold mb-3">{{product.name}}</h2>

            <h4 class="fw-bold mb-4">{{product.price}} LE</h4>

            <div class="border rounded-3 p-3 mb-4 bg-white">
                <h6 class="fw-bold text-uppercase mb-3">Description</h6>
                <p class="text-muted mb-0">{{product.description}}</p>
            </div>

            <div class="mb-4">
                <button class="btn text-white px-4 py-3 rounded-3 w-100 fw-semibold"
                        style="background:#2ead63;"
                        ng-click="addToCart()">
                    Add to Cart
                </button>
            </div>

            <div class="border rounded-3 p-3 mb-3 bg-white">
                <p class="mb-0">
                    <span class="fw-bold">Estimated delivery:</span>
                    2 - 3 days
                </p>
            </div>

            <div class="border rounded-3 p-3 bg-white">
                <p class="mb-0">
                    <span class="fw-bold">Free shipping:</span>
                    On orders over 500 LE
                </p>
            </div>
        </div>

    </div>
</section>
