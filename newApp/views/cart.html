<section class="container py-5">
    <p class="text-muted small mb-2">Home > Shop > Cart</p>
    <h2 class="fw-bold mb-4">Shopping Cart</h2>

    <div ng-if="cartItems.length === 0" class="text-center py-5">
        <div class="mb-3" style="font-size:60px; opacity:.45;">🛒</div>
        <h5 class="fw-bold">Your cart is currently empty</h5>
        <p class="text-muted">Continue Shopping</p>
        <a href="#/shop" class="btn text-white px-4 rounded-3" style="background:#2ead63;">
            Go to shop
        </a>
    </div>

    <div ng-if="cartItems.length > 0" class="row g-4 align-items-start">
        <div class="col-lg-7">
            <div class="card mb-3 shadow-sm border-0 rounded-4" ng-repeat="item in cartItems track by item.id">
                <div class="card-body d-flex gap-3 align-items-start p-3">
                    <img ng-src="{{item.img}}" alt="{{item.name}}" width="90" class="rounded-3">

                    <div class="flex-grow-1">
                        <h5 class="mb-1">{{item.name}}</h5>
                        <p class="mb-2 text-muted">{{item.price}} LE</p>

                        <div class="d-flex align-items-center gap-2 flex-wrap">
                            <div class="d-flex align-items-center gap-2 border rounded-3 px-2 py-1">
                                <button class="btn btn-sm p-0 px-2 border-0" style="color:#2ead63;" ng-click="decreaseQty(item)">-</button>
                                <span class="fw-semibold">{{item.quantity}}</span>
                                <button class="btn btn-sm p-0 px-2 border-0" style="color:#2ead63;" ng-click="increaseQty(item)">+</button>
                            </div>

                            <button class="btn btn-sm btn-outline-danger" ng-click="removeItem(item)">
                                Remove
                            </button>
                        </div>

                        <p class="mb-0 fw-bold mt-2">{{item.price * item.quantity}} LE</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4" style="color:#2ead63;">Order Summary</h4>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Subtotal</span>
                        <span class="fw-semibold">{{subtotal}} LE</span>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Shipping</span>
                        <span class="fw-semibold">{{shipping}}</span>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-bold">Total</span>
                        <span class="fw-bold">{{subtotal}} LE</span>
                    </div>

                    <a href="#/checkout" class="btn text-white w-100 rounded-3 py-2" style="background:#2ead63;">
                        Checkout
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
